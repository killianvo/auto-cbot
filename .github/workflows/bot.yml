name: Auto Get CME PDF

on:
  schedule:
    # Chạy tự động vào 6:00 sáng giờ VN mỗi ngày (23:00 UTC)
    - cron: '0 23 * * *'
  workflow_dispatch: # Nút này cho phép bạn bấm chạy thủ công bất kỳ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt công cụ
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Chạy Bot lấy dữ liệu
        run: python script.py

      - name: Lưu trữ 3 file PDF
        uses: actions/upload-artifact@v4
        with:
          name: CME-Audit-PDFs
          path: "*.pdf"
          retention-days: 90
