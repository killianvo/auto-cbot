YAML
name: Auto Get CME PDF

on:
  schedule:
    # 00:00 UTC tương đương đúng 7:00 sáng giờ VN
    # 2-6 tương đương từ Thứ 3 đến Thứ 7 (Né Chủ Nhật và Thứ 2 vì sàn Mỹ đóng cửa cuối tuần)
    - cron: '0 0 * * 2-6'
  workflow_dispatch: # Nút bấm chạy thủ công khi cần gấp

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt công cụ
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Chạy Bot lấy dữ liệu
        run: python script.py

      # --- CẢI TIẾN: TỰ ĐỘNG NHẬN DIỆN THỨ 2 ĐỂ LẤY NGÀY THỨ 6 TUẦN TRƯỚC ---
      - name: Tính toán ngày dữ liệu
        id: date_calc
        run: |
          # date +%u trả về số từ 1-7 tương ứng Thứ 2 - Chủ Nhật
          CURRENT_DAY=$(date +%u)
          
          if [ "$CURRENT_DAY" -eq 1 ]; then
            # Nếu hôm nay là Thứ 2, lùi lại 3 ngày để lấy ngày Thứ 6 tuần trước
            echo "DATA_DATE=$(date -d "3 days ago" +'%d-%m')" >> $GITHUB_ENV
            echo "Phát hiện Thứ 2: Đã đặt tên theo ngày Thứ 6 tuần trước"
          else
            # Các ngày khác (Thứ 3 đến Thứ 7), lấy ngày hôm qua (d-1) như cũ
            echo "DATA_DATE=$(date -d "yesterday" +'%d-%m')" >> $GITHUB_ENV
            echo "Các ngày khác: Đã đặt tên theo ngày hôm qua"
          fi

      - name: Lưu trữ 3 file PDF
        uses: actions/upload-artifact@v4
        with:
          # File zip tải về sẽ có tên kèm ngày động chính xác theo logic trên
          name: CME-Data-${{ env.DATA_DATE }}
          path: "*.pdf"
          retention-days: 90
