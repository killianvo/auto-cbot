name: Auto Get CME PDF

on:
  schedule:
    # Chạy vào 15:17 chiều giờ VN (8:17 UTC) - Né giờ tròn để bot chạy nhanh hơn
    - cron: '17 8 * * 1-5'
  workflow_dispatch: # Nút này cho phép bạn bấm chạy thủ công bất kỳ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt công cụ
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Chạy Bot lấy dữ liệu
        run: python script.py

      - name: Tính toán ngày dữ liệu (Ngày hôm qua)
        id: date_calc
        run: |
          # Lấy thời gian hiện tại trừ đi 1 ngày, định dạng thành Ngày-Tháng (Ví dụ: 18-06)
          echo "DATA_DATE=$(date -d "yesterday" +'%d-%m')" >> $GITHUB_ENV

      - name: Lưu trữ 3 file PDF
        uses: actions/upload-artifact@v4
        with:
          # File zip tải về sẽ có tên kèm ngày dạng: CME-Data-18-06
          name: CME-Data-${{ env.DATA_DATE }}
          path: "*.pdf"
          retention-days: 90
